repos:
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: forbid-crlf
      - id: remove-crlf
      - id: forbid-tabs
      - id: remove-tabs
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-ligatures
      - id: fix-smartquotes
      - id: fix-spaces
      - id: fix-unicode-dashes
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [--ignore-words=accepted-words.txt]
        exclude: ^src/at/
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: ["--wrap", "80", "--number", "--keep-footnote-orphans"]
        additional_dependencies:
          - mdformat-footnote
          - mdformat-frontmatter
          - mdformat-gfm
          - mdformat-mkdocs
          - mdformat-simple-breaks
  - repo: local
    hooks:
      - id: zensical-build
        name: zensical build
        entry: uv run zensical build --strict -f mkdocs.yml
        language: system
        pass_filenames: false
        always_run: true
