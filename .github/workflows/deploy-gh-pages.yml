name: deploy-gh-pages

on: [push]


# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.14
      - name: Install dependencies
        run: uv sync --frozen

  prek:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.14
      - name: Install dependencies
        run: uv sync --frozen
      - uses: j178/prek-action@v2

  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.14
      - name: Install dependencies
        run: uv sync --no-dev
      - name: Build en site
        run: uv run zensical build -f mkdocs.yml

        # fix file permissions before packaging; GitHub Pages requires all files to be readable
      - name: Fix permissions
        run: |
          chmod -c -R +rX "site/en/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Package artifact
        run: tar --dereference --hard-dereference --exclude=.git --exclude=.github --exclude='.[^/]*' -cf "$RUNNER_TEMP/artifact.tar" -C site/en .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [build, prek]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
