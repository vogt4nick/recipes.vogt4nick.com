INHERIT: ../base.yml
docs_dir: ../../src/en
extra:
  alternate:
    - name: Switch to Austrian Cookbook
      link: /at/
      lang: at
plugins:
  - awesome-pages:
      collapse_single_pages: false
      filename: .pages
      strict: true
      order: asc
  - exclude:
      regex:
        - '.*pages.ya?ml'
  - privacy
  - search:
      lang: en
site_dir: ../../site/en
site_name: Nick's Recipes
site_url: https://github.com/vogt4nick/recipes.vogt4nick.com
theme:
  language: en
